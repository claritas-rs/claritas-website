name: Update Claritas Version

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-version:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch latest Claritas release
        id: latest
        run: |
          set -euo pipefail
          TAG=$(curl -fsSL https://api.github.com/repos/claritas-rs/claritas/releases/latest | jq -r '.tag_name')

          if [ -z "$TAG" ] || [ "$TAG" = "null" ]; then
            echo "Could not fetch the latest release tag."
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Update website version constant
        run: |
          set -euo pipefail
          TAG='${{ steps.latest.outputs.tag }}'
          sed -i -E "s/^pub const CLARITAS_VERSION: &str = \".*\";/pub const CLARITAS_VERSION: &str = \"${TAG}\";/" src/version.rs

      - name: Commit and push changes
        run: |
          set -euo pipefail

          if git diff --quiet; then
            echo "No version changes found."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add src/version.rs
          git commit -m "chore: update Claritas version to ${{ steps.latest.outputs.tag }}"
          git push
